# SPDX-License-Identifier: Apache-2.0
# CI: correctness tests + a performance/size regression gate vs Apache Parquet C++.
name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-bench:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # The pcapng2parquet example vendors nanotins as a submodule under
          # examples/pcapng2parquet/extern; fetch it so the example configures.
          submodules: recursive

      - name: Install toolchain + pyarrow
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build g++
          # pyarrow provides both the readback used by the smoke test and the
          # libparquet/libarrow + headers the Apache benchmark baseline links.
          python3 -m pip install --upgrade pip
          python3 -m pip install "pyarrow>=16" pandas

      # FetchContent pulls nanoarrow + builds zstd from source; cache so only the
      # first run pays for it.
      - name: Cache fetched deps
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DN2P_BUILD_TESTS=ON \
            -DN2P_BUILD_EXAMPLES=ON \
            -DN2P_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build

      # Correctness: roundtrip unit test, single-header ODR build, amalgamation
      # freshness, pyarrow smoke roundtrip, and the bench regression gate. The
      # regression gate compares n2p vs Apache Parquet C++ on this same runner, so
      # its ratios are stable despite shared-runner noise.
      - name: Run tests (ctest)
        working-directory: build
        run: ctest --output-on-failure

      # Also run a slightly larger regression matrix and publish the numbers, so a
      # PR shows the actual write speed / file size next to Arrow.
      - name: Benchmark report (1 GB, 200/500 MB chunks)
        run: |
          python3 bench/run_bench.py --check \
            --bin-dir build --totals 1024 --chunks 200,500 \
            --codecs zstd,uncompressed --repeat 2 \
            --json bench-results.json | tee bench-report.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            bench-report.txt
            bench-results.json
